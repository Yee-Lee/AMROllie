<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ollie Web Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body {
            background-color: #121212; color: #ffffff;
            font-family: sans-serif; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0;
            overflow: hidden; /* 防止手機瀏覽器滑動刷新 */
        }
        #status { margin-bottom: 20px; font-weight: bold; color: #ff4444; }
        #joystick-zone {
            width: 300px; height: 300px;
            background-color: #1e1e1e; border-radius: 20px;
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h2>Ollie Web Controller</h2>
    <div id="status">連線狀態: 未連線</div>
    <div id="joystick-zone"></div>

    <script>
        // 1. 連線到 ROS 2 WebSocket (請將 localhost 改成你 RPi 的 IP)
        const ros = new ROSLIB.Ros({
            url : 'ws://192.168.0.103:9090' 
        });

        const statusEl = document.getElementById('status');

        ros.on('connection', function() {
            statusEl.innerText = '連線狀態: 已連線 🟢';
            statusEl.style.color = '#00C851';
        });

        ros.on('error', function(error) {
            statusEl.innerText = '連線狀態: 錯誤 🔴';
            statusEl.style.color = '#ff4444';
        });

        ros.on('close', function() {
            statusEl.innerText = '連線狀態: 已斷開 ⚪';
            statusEl.style.color = '#aaaaaa';
        });

        // 2. 設定要發布的 Topic (/cmd_vel)
        const cmdVel = new ROSLIB.Topic({
            ros : ros,
            name : '/cmd_vel',
            messageType : 'geometry_msgs/msg/Twist'
        });

        // 3. 初始化虛擬搖桿
        const joystick = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#00C851'
        });

        // 4. 監聽搖桿移動事件並發布 ROS 訊息
        joystick.on('move', function (evt, data) {
            // Nipple.js 提供的角度和力度
            const distance = data.distance; // 0 到 50
            const angle = data.angle.radian; // 0 到 2PI

            // 將力道正規化 (最大速度設為 0.5 m/s)
            const max_linear_vel = 0.5;
            const max_angular_vel = 1.0;
            const normalized_dist = distance / 50.0; 

            // 計算前進速度與轉向速度 (簡單的三角函數轉換)
            const linear_x = Math.sin(angle) * max_linear_vel * normalized_dist;
            const angular_z = -Math.cos(angle) * max_angular_vel * normalized_dist;

            const twist = new ROSLIB.Message({
                linear : { x : linear_x, y : 0.0, z : 0.0 },
                angular : { x : 0.0, y : 0.0, z : angular_z }
            });
            cmdVel.publish(twist);
        });

        // 5. 搖桿放開時，發送煞車指令 (全零)
        joystick.on('end', function () {
            const stopMsg = new ROSLIB.Message({
                linear : { x : 0.0, y : 0.0, z : 0.0 },
                angular : { x : 0.0, y : 0.0, z : 0.0 }
            });
            cmdVel.publish(stopMsg);
        });
    </script>
</body>
</html>
